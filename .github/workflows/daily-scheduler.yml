name: Daily destination scheduler

on:
  schedule:
    # 07:00 Australia/Sydney (AEST UTC+10). During AEDT (UTC+11) this runs at 08:00 local.
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no writes, no GPT calls)"
        type: boolean
        default: false
      brand:
        description: "Single brand domain (optional)"
        type: string
        required: false
      limit:
        description: "Max ads per brand"
        type: string
        default: "40"

jobs:
  daily-scheduler:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily scheduler
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          META_ADS_LIMIT: ${{ github.event.inputs.limit || '40' }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ github.event.inputs.brand }}" ]; then ARGS="$ARGS --brand ${{ github.event.inputs.brand }}"; fi
          if [ -n "${{ github.event.inputs.limit }}" ]; then ARGS="$ARGS --limit ${{ github.event.inputs.limit }}"; fi
          npm run daily-scheduler -- $ARGS
